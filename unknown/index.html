
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>???</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(15, 15, 15, 0.78);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f5f2ea;
      --muted: rgba(245, 242, 234, 0.64);
      --accent: #d94841;
      --glow: rgba(217, 72, 65, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(217, 72, 65, 0.18), transparent 26%),
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.07), transparent 22%),
        linear-gradient(180deg, #0a0a0a 0%, #030303 100%);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    body::before {
      content: "04";
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: min(70vw, 42rem);
      line-height: 1;
      color: rgba(255, 255, 255, 0.035);
      letter-spacing: 0.04em;
      pointer-events: none;
      user-select: none;
      transform: translateY(-4%);
    }

    main {
      position: relative;
      width: min(92vw, 980px);
      padding: clamp(1.4rem, 4vw, 2.5rem);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.45),
        0 0 60px var(--glow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      margin: 0 0 0.85rem;
      color: var(--muted);
      font-family: "Trebuchet MS", "Arial Narrow", sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 5.75rem);
      line-height: 0.95;
      text-transform: uppercase;
    }

    .subcopy {
      max-width: 40rem;
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .unit {
      padding: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      text-align: center;
    }

    .value {
      display: block;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 0.9;
      letter-spacing: 0.04em;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.08);
    }

    .label {
      display: block;
      margin-top: 0.6rem;
      color: var(--muted);
      font-family: "Trebuchet MS", "Arial Narrow", sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .target {
      margin: 1.35rem 0 0;
      color: var(--accent);
      font-family: "Trebuchet MS", "Arial Narrow", sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      body {
        padding: 1rem;
      }

      main {
        border-radius: 22px;
      }

      .timer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Unknown Transmission</p>
    <h1>Until April 4</h1>
    <p class="subcopy">A live countdown to the next April 4, based on the visitor's local time.</p>

    <section class="timer" aria-label="Countdown timer">
      <div class="unit">
        <span class="value" id="days">00</span>
        <span class="label">Days</span>
      </div>
      <div class="unit">
        <span class="value" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="unit">
        <span class="value" id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="unit">
        <span class="value" id="seconds">00</span>
        <span class="label">Seconds</span>
      </div>
    </section>

    <p class="target" id="target-date">Counting down...</p>
  </main>

  <script>
    const countdownFields = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds")
    };
    const targetDateLabel = document.getElementById("target-date");
    const targetDateFormatter = new Intl.DateTimeFormat("en", {
      weekday: "long",
      month: "long",
      day: "numeric",
      year: "numeric"
    });

    function getNextAprilFourth(now = new Date()) {
      const year = now.getFullYear();
      const candidate = new Date(year, 3, 4, 0, 0, 0, 0);

      if (now < candidate) {
        return candidate;
      }

      return new Date(year + 1, 3, 4, 0, 0, 0, 0);
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function renderCountdown() {
      const now = new Date();
      const target = getNextAprilFourth(now);
      const diff = Math.max(0, target - now);
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      countdownFields.days.textContent = String(days);
      countdownFields.hours.textContent = pad(hours);
      countdownFields.minutes.textContent = pad(minutes);
      countdownFields.seconds.textContent = pad(seconds);
      targetDateLabel.textContent = targetDateFormatter.format(target) + " at 00:00 local time";
    }

    renderCountdown();
    window.setInterval(renderCountdown, 1000);
  </script>
</body>
</html>
