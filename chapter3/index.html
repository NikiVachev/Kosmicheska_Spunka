<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>???</title>
  <style>
    :root {
      --bg: #000000;
      --fg: #f5f5f5;
      --glow: rgba(255, 255, 255, 0.24);
      --six-scale: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    }

    .numbers {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .numbers::before {
      content: "6";
      position: absolute;
      left: 54%;
      top: 45%;
      transform: translate(-50%, -56%);
      font-size: calc(clamp(620rem, 760vw, 830rem) * var(--six-scale));
      line-height: 0.72;
      color: rgba(255, 255, 255, 0.028);
      text-shadow: 0 0 60px rgba(255, 255, 255, 0.01);
      z-index: -1;
      pointer-events: none;
    }

    .cluster {
      position: absolute;
      left: 54%;
      top: 60%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(0.35rem, 1.3vw, 1rem);
      width: min(78vw, 900px);
      text-align: center;
      z-index: 1;
    }

    .number {
      position: relative;
      line-height: 0.9;
      text-shadow: 0 0 24px var(--glow);
    }

    .one {
      font-size: clamp(4.5rem, 11vw, 8rem);
      color: transparent;
      text-shadow: none;
    }

    .two {
      font-size: clamp(2.25rem, 6vw, 4rem);
    }

    .three {
      font-size: clamp(3.5rem, 8.5vw, 6rem);
    }

    .four {
      font-size: clamp(5.5rem, 14vw, 10rem);
      color: transparent;
      text-shadow: none;
    }

    .five {
      font-size: clamp(5rem, 12vw, 9rem);
      opacity: 0.58;
    }
  </style>
</head>
<body>
  <main class="numbers" aria-label="Five centered numbers">
    <div class="cluster">
      <span class="number one">1</span>
      <span class="number two">2</span>
      <span class="number three">3</span>
      <span class="number four">4</span>
      <span class="number five">5</span>
    </div>
  </main>
  <audio
    id="chapter-audio"
    src="WALTZ OF SECCOM MASADA.mp3"
    autoplay
    loop
    preload="auto"
  ></audio>
  <script>
    const root = document.documentElement;
    const chapterAudio = document.getElementById("chapter-audio");
    const baselineZoom = window.devicePixelRatio || 1;

    function updateSixScale() {
      const currentZoom = window.devicePixelRatio || 1;
      const zoomRatio = currentZoom / baselineZoom;
      const softScale = 1 + (zoomRatio - 1) * 0.35;
      const clampedScale = Math.min(1.2, Math.max(0.82, softScale));

      root.style.setProperty("--six-scale", clampedScale.toFixed(3));
    }

    updateSixScale();
    window.addEventListener("resize", updateSixScale);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateSixScale);
    }

    function startLoopingAudio() {
      chapterAudio.play().catch(() => {});
    }

    startLoopingAudio();

    function unlockAudio() {
      startLoopingAudio();
      window.removeEventListener("pointerdown", unlockAudio);
      window.removeEventListener("keydown", unlockAudio);
    }

    window.addEventListener("pointerdown", unlockAudio, { once: true });
    window.addEventListener("keydown", unlockAudio, { once: true });
  </script>
</body>
</html>
